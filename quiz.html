<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Interactive Quiz</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(120deg, #ffecd2, #fcb69f);
      margin: 0;
      padding: 0;
    }

    .quiz-box {
      width: 90%;
      max-width: 600px;
      background: white;
      padding: 30px;
      margin: 50px auto;
      border-radius: 15px;
      box-shadow: 0 10px 20px rgba(0, 0, 0, 0.2);
      text-align: center;
    }

    .question {
      font-size: 22px;
      margin-bottom: 20px;
    }

    .option {
      display: block;
      padding: 12px;
      margin: 10px 0;
      background-color: #f1f1f1;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 18px;
      transition: 0.3s ease;
    }

    .option:hover {
      background-color: #ddd;
    }

    .correct {
      background-color: #4CAF50 !important;
      color: white;
    }

    .wrong {
      background-color: #f44336 !important;
      color: white;
    }

    #popup {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background-color: rgba(0, 0, 0, 0.8);
      display: none;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.5s ease-in-out;
    }

    #popup.show {
      opacity: 1;
    }

    #popup .content {
      background: white;
      padding: 40px;
      border-radius: 20px;
      text-align: center;
    }

    #popup h2 {
      margin-bottom: 20px;
    }

    .btn {
      padding: 10px 20px;
      margin: 10px;
      font-size: 16px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
    }

    .btn:hover {
      opacity: 0.9;
    }

    .btn-home {
      background: #28a745;
      color: white;
    }

    .btn-retry {
      background: #007bff;
      color: white;
    }
  </style>
</head>
<body>

<div class="quiz-box">
  <div id="question" class="question">Loading...</div>
  <div id="options"></div>
</div>

<div id="popup">
  <div class="content">
    <h2> Quiz Finished!</h2>
    <p id="scoreText"></p>
    <button class="btn btn-retry" onclick="startQuiz()">Retry</button>
    <button class="btn btn-home" onclick="location.href='index.html'">Home</button>
  </div>
</div>
<script>
  const quizData = [
    {
      question: "What gets wetter the more it dries?",
      options: ["Sponge", "Rain", "Towel", "Soap"],
      answer: "Towel"
    },
    {
      question: " What has hands but can’t clap?",
      options: ["Clock", "Human", "Robot", "Dog"],
      answer: "Clock"
    },
    {
      question: "What has a head and a tail but no body?",
      options: ["Snake", "Coin", "Lizard", "Worm"],
      answer: "Coin"
    },
    {
      question: "What can run but never walks?",
      options: ["Water", "Dog", "River", "Wind"],
      answer: "River"
    }
  ];

  let currentQuestion = 0;
  let score = 0;
  let locked = false;

  // Start the quiz
  function startQuiz() {
    score = 0;
    currentQuestion = 0;
    document.getElementById("popup").style.display = "none";
    document.getElementById("popup").classList.remove("show");
    showQuestion();
  }

  // Show the current question
  function showQuestion() {
    locked = false;
    const q = quizData[currentQuestion];
    document.getElementById("question").innerText = q.question;

    const optionsDiv = document.getElementById("options");
    optionsDiv.innerHTML = "";

    q.options.forEach(opt => {
      const btn = document.createElement("button");
      btn.className = "option";
      btn.innerText = opt;
      btn.onclick = () => checkAnswer(btn, q.answer);
      optionsDiv.appendChild(btn);
    });
  }

  // Check if the answer is correct
  function checkAnswer(button, correctAnswer) {
    if (locked) return;
    locked = true;

    const allOptions = document.querySelectorAll(".option");
    allOptions.forEach(btn => {
      btn.disabled = true;
      if (btn.innerText === correctAnswer) {
        btn.classList.add("correct");
      }
    });

    if (button.innerText !== correctAnswer) {
      button.classList.add("wrong");
    } else {
      score++;
    }

    setTimeout(() => {
      currentQuestion++;
      if (currentQuestion < quizData.length) {
        showQuestion();
      } else {
        // Score
        document.getElementById("scoreText").innerText = `You scored ${score} out of ${quizData.length}`;
        document.getElementById("popup").style.display = "flex";
        document.getElementById("popup").classList.add("show");
      }
    }, 1000);
  }

  // Start
  window.onload = startQuiz;
</script>
</body>
</html>
