<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Drawing Game</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <style>
    body {
      font-family: 'Arial', sans-serif;
      text-align: center;
      background-color: #f0f0f0;
      padding: 50px;
    }

    canvas {
      border: 1px solid #000;
      margin: 20px;
      width: 80%;
      height: 300px;
    }

    .btn-section {
      margin-top: 20px;
    }

    .drawing-prompt {
      font-size: 20px;
      margin-top: 20px;
    }

    .rating {
      margin-top: 20px;
      font-size: 18px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Drawing Game</h1>
    <p>Draw the object shown below on the canvas.</p>
    <p id="prompt" class="drawing-prompt">Draw a cat </p>
    <canvas id="drawingCanvas"></canvas>
    <br />
    <button onclick="clearCanvas()" class="btn btn-warning">Clear</button>

    <div class="rating">
      <button onclick="rateDrawing()" class="btn btn-success">Rate My Drawing</button>
      <div id="rating-result"></div>
    </div>

    <div class="btn-section">
      <a href="game.html" class="btn btn-secondary">Back to Game Selection</a>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('drawingCanvas');
    const ctx = canvas.getContext('2d');
    let isDrawing = false;

    canvas.width = 500;
    canvas.height = 300;

    canvas.addEventListener('mousedown', startDrawing);
    canvas.addEventListener('mousemove', draw);
    canvas.addEventListener('mouseup', stopDrawing);
    canvas.addEventListener('mouseout', stopDrawing);

    function startDrawing(e) {
      isDrawing = true;
      draw(e);
    }

    function draw(e) {
      if (!isDrawing) return;

      ctx.lineWidth = 5;
      ctx.lineCap = 'round';
      ctx.strokeStyle = 'black';

      ctx.lineTo(e.clientX - canvas.offsetLeft, e.clientY - canvas.offsetTop);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(e.clientX - canvas.offsetLeft, e.clientY - canvas.offsetTop);
    }

    function stopDrawing() {
      isDrawing = false;
      ctx.beginPath();
    }

    function clearCanvas() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
    }

    function rateDrawing() {
      const rating = Math.random(); // Simulate rating
      const result = rating > 0.5 ? "Great job!" : "Keep practicing!";
      document.getElementById('rating-result').innerText = result;
    }
  </script>
</body>
</html>
