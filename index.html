<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Welcome Page</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #ffe3e3, #ffd6f6);
      overflow: hidden;
      position: relative;
      padding: 0;
      height: 100vh;
    }

    .container {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 90vh;
      text-align: center;
      position: relative;
      z-index: 2;
    }

    h1 {
      font-size: 3rem;
      color: #ff4081;
      margin-bottom: 10px;
      animation: fadeInDown 1s ease-out;
    }

    p {
      font-size: 1.2rem;
      color: #444;
      animation: fadeInUp 1.5s ease-out;
    }

    .btn-group {
      margin-top: 30px;
      display: flex;
      gap: 40px;
      flex-wrap: wrap;
      animation: fadeIn 2s ease-out;
    }

    .btn-box {
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: pointer;
      transition: transform 0.3s ease;
    }

    .btn-box:hover {
      transform: scale(1.05);
    }

    .btn-image {
      width: 120px;
      height: 120px;
      border-radius: 20px;
      object-fit: cover;
      box-shadow: 0 6px 15px rgba(0, 0, 0, 0.3);
      animation: popIn 1s ease;
    }

    .btn-label {
      margin-top: 10px;
      font-size: 18px;
      font-weight: bold;
      color: #ff4081;
    }

    

    
  </style>
</head>
<body>

  <div class="container">
    <h1> Welcome to My Interactive World</h1>
    <p>Explore games, quizzes, and fun just for you!</p>

    <div class="btn-group">
      <!--Games-->
      <div class="btn-box" onclick="location.href='game.html'">
        <img src="assets/game.png" alt="Games" class="btn-image">
        <div class="btn-label">Games</div>
      </div>

      <!--quiz-->
      <div class="btn-box" onclick="location.href='quiz.html'">
        <img src="assets/qiz.png" alt="Quizzes" class="btn-image">
        <div class="btn-label">Quizzes</div>
      </div>

      <!--Rate -->
      <div class="btn-box" onclick="location.href='rate.html'">
        <img src="assets/rate.png" alt="Rate" class="btn-image">
        <div class="btn-label">Rate Website</div>
      </div>
    </div>
  </div>

</body>
</html>
