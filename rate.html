<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Rate Us</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 20px;
      border: 10px solid #ff69b4; /* Page border */
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #fff1f8, #e1f0ff);
      text-align: center;
      height: 100vh;
      position: relative;
      overflow: hidden;
    }

    h2 {
      color: #ff4081;
      margin-top: 0;
    }

    .stars {
      font-size: 2rem;
      margin: 20px 0;
    }

    .star {
      cursor: pointer;
      color: #ccc;
      transition: transform 0.2s;
    }

    .star:hover {
      transform: scale(1.3);
    }

    .star.selected {
      color: gold;
    }

    .btn {
      padding: 10px 20px;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      background-color: #ff69b4;
      color: white;
      transition: 0.3s;
    }

    .btn:hover {
      background-color: #ff1493;
    }

    .move {
      position: absolute;
    }

    .message {
      margin-top: 20px;
      font-size: 1.2rem;
      color: #333;
      display: none;
    }

    .pop-message {
      font-size: 2rem;
      color: #ff4081;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <h2>How would you rate our website?</h2>

  <div class="stars" id="starContainer">
    <span class="star" data-value="1">★</span>
    <span class="star" data-value="2">★</span>
    <span class="star" data-value="3">★</span>
    <span class="star" data-value="4">★</span>
    <span class="star" data-value="5">★</span>
  </div>

  <div class="message" id="feedbackMsg"></div>
  <div class="message" id="thankYouMsg"></div>

  <button class="btn" id="excellentBtn">Excellent</button>
  <button class="btn move" id="okBtn">Ok-Ok</button>
  <button class="btn move" id="poorBtn">Poor</button>

  <script>
    const stars = document.querySelectorAll('.star');
    const feedbackMsg = document.getElementById('feedbackMsg');
    const thankYouMsg = document.getElementById('thankYouMsg');
    let rating = 0;

    const messages = {
      1: "😢 Oh no! We'll work harder!",
      2: "😐 Thanks, we’ll try to improve!",
      3: "🙂 Appreciate your feedback!",
      4: "😄 Great! So glad you liked it!",
      5: "🎉 Amazing! You're awesome! 🥳"
    };

    function highlightStars(value) {
      stars.forEach(star => {
        const val = parseInt(star.dataset.value);
        star.classList.toggle('selected', val <= value);
      });
    }

    stars.forEach(star => {
      star.addEventListener('mouseover', () => highlightStars(star.dataset.value));
      star.addEventListener('mouseout', () => highlightStars(rating));
      star.addEventListener('click', () => {
        rating = parseInt(star.dataset.value);
        highlightStars(rating);
        feedbackMsg.innerText = messages[rating];
        feedbackMsg.style.display = 'block';
        feedbackMsg.classList.toggle('pop-message', rating === 5);
      });
    });

    const excellentBtn = document.getElementById('excellentBtn');
    const okBtn = document.getElementById('okBtn');
    const poorBtn = document.getElementById('poorBtn');

    excellentBtn.addEventListener('click', () => {
      thankYouMsg.innerText = "Thank you for your rating!";
      thankYouMsg.style.display = 'block';
      thankYouMsg.classList.add('pop-message');
    });

    function moveButton(btn) {
      const borderWidth = 10 + 20; // border + padding
      const maxX = window.innerWidth - btn.offsetWidth - borderWidth;
      const maxY = window.innerHeight - btn.offsetHeight - borderWidth;

      const x = Math.random() * maxX;
      const y = Math.random() * maxY;

      btn.style.left = `${x}px`;
      btn.style.top = `${y}px`;
    }

    okBtn.addEventListener('mouseover', () => moveButton(okBtn));
    poorBtn.addEventListener('mouseover', () => moveButton(poorBtn));
  </script>
</body>
</html>
