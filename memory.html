<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Memory Game</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #fbc2eb, #a6c1ee);
      margin: 0;
      padding: 0;
      text-align: center;
    }

    h1 {
      margin-top: 20px;
      color: #333;
    }

    #timer {
      font-size: 20px;
      margin-bottom: 10px;
    }

    #game-board {
      display: grid;
      grid-template-columns: repeat(4, 80px);
      grid-gap: 10px;
      justify-content: center;
      margin: 30px auto;
    }

    .card {
      width: 80px;
      height: 80px;
      background-color: white;
      border-radius: 10px;
      font-size: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: transform 0.3s;
      box-shadow: 0 4px 10px rgba(0,0,0,0.2);
    }

    .card.flipped {
      background-color: #e0f7fa;
    }

    #popup {
      position: fixed;
      top: 0; left: 0;
      width: 100%; height: 100%;
      background-color: rgba(0, 0, 0, 0.7);
      display: none;
      align-items: center;
      justify-content: center;
    }

    #popup .content {
      background: white;
      padding: 30px;
      border-radius: 15px;
      text-align: center;
    }

    #popup h2 {
      margin-bottom: 15px;
    }

    .btn {
      padding: 10px 20px;
      margin: 10px;
      font-size: 16px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
    }

    .btn-home {
      background: #28a745;
      color: white;
    }

    .btn-retry {
      background: #007bff;
      color: white;
    }
  </style>
</head>
<body>

<h1>Memory Match Game </h1>
<div id="timer">Time left: <span id="time">60</span>s</div>
<div id="game-board"></div>

<div id="popup">
  <div class="content">
    <h2 id="popup-title">🎉</h2>
    <p id="scoreText"></p>
    <button class="btn btn-retry" onclick="startGame()">Retry</button>
    <button class="btn btn-home" onclick="location.href='game.html'">Home</button>
  </div>
</div>

<script>
  const emojis = ["🐶", "🐱", "🦊", "🐼", "🐵", "🐸", "🦁", "🐷"];
  let cards = [];
  let firstCard = null;
  let secondCard = null;
  let lockBoard = false;
  let matchedPairs = 0;
  let timer;
  let timeLeft = 60;

  function startGame() {
    document.getElementById('popup').style.display = 'none';
    document.getElementById('scoreText').innerText = '';
    document.getElementById('popup-title').innerText = '';
    matchedPairs = 0;
    resetTimer();
    generateCards();
    startTimer();
  }

  function resetTimer() {
    clearInterval(timer);
    timeLeft = 60;
    document.getElementById('time').innerText = timeLeft;
  }

  function startTimer() {
    timer = setInterval(() => {
      timeLeft--;
      document.getElementById('time').innerText = timeLeft;

      if (timeLeft <= 0) {
        clearInterval(timer);
        showPopup("⏰ Time's Up!", matchedPairs);
      }
    }, 1000);
  }

  function generateCards() {
    const gameBoard = document.getElementById("game-board");
    gameBoard.innerHTML = '';
    cards = [...emojis, ...emojis].sort(() => Math.random() - 0.5);

    cards.forEach((emoji, index) => {
      const card = document.createElement("div");
      card.className = "card";
      card.dataset.emoji = emoji;
      card.dataset.index = index;
      card.addEventListener("click", flipCard);
      gameBoard.appendChild(card);
    });
  }

  function flipCard() {
    if (lockBoard) return;
    if (this.classList.contains("flipped")) return;

    this.textContent = this.dataset.emoji;
    this.classList.add("flipped");

    if (!firstCard) {
      firstCard = this;
      return;
    }

    secondCard = this;
    lockBoard = true;

    if (firstCard.dataset.emoji === secondCard.dataset.emoji) {
      matchedPairs++;
      firstCard = null;
      secondCard = null;
      lockBoard = false;

      if (matchedPairs === emojis.length) {
        clearInterval(timer);
        showPopup("🎉 You Matched All!", matchedPairs);
      }
    } else {
      setTimeout(() => {
        firstCard.textContent = "";
        secondCard.textContent = "";
        firstCard.classList.remove("flipped");
        secondCard.classList.remove("flipped");
        firstCard = null;
        secondCard = null;
        lockBoard = false;
      }, 800);
    }
  }

  function showPopup(title, score) {
    document.getElementById('popup').style.display = 'flex';
    document.getElementById('popup-title').innerText = title;
    document.getElementById('scoreText').innerText = `Your Score: ${score} pairs`;
  }

  window.onload = startGame;
</script>
</body>
</html>
